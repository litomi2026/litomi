name: Kubernetes Image Delivery

on:
  push:
    branches: [main, stage]
    # Skip k8s-only changes to avoid rebuilding images for manifest-only commits.
    paths-ignore:
      - 'k8s/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: kubernetes-image-delivery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish-web-image:
    name: Build and publish web image
    if: ${{ github.ref_name == 'main' || github.ref_name == 'stage' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.resolve_published_web_digest.outputs.digest }}
    env:
      OVERLAY_DIR: ${{ github.ref_name == 'main' && 'k8s/apps/litomi/overlays/prod' || github.ref_name == 'stage' && 'k8s/apps/litomi/overlays/stg' || '' }}
      IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/litomi-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load public web build arguments from overlay
        id: load_public_env
        shell: bash
        run: |
          set -euo pipefail
          file="${OVERLAY_DIR}/public.env.kv"

          if [ ! -f "$file" ]; then
            echo "public.env.kv not found: $file" >&2
            exit 1
          fi

          if grep -nEv '^(#|[[:space:]]*$|NEXT_PUBLIC_[A-Z0-9_]+=.*)$' "$file"; then
            echo "public.env.kv must contain only NEXT_PUBLIC_* assignments, blank lines, or comments." >&2
            exit 1
          fi

          tmp="$(mktemp)"
          grep -E '^[[:space:]]*NEXT_PUBLIC_[A-Z0-9_]+=.*$' "$file" > "$tmp" || true

          if [ ! -s "$tmp" ]; then
            echo "No NEXT_PUBLIC_* entries found in $file" >&2
            exit 1
          fi

          echo "build_args<<EOF" >> "$GITHUB_OUTPUT"
          cat "$tmp" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate web image metadata
        id: metadata_web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish web image for production
        id: build_web_production
        if: ${{ github.ref_name == 'main' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.nextjs
          platforms: linux/arm64
          push: true
          build-args: |
            CI=true
            COMMIT_SHA=${{ github.sha }}
            ${{ steps.load_public_env.outputs.build_args }}
          secrets: |
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SUPABASE_CERTIFICATE=${{ secrets.SUPABASE_CERTIFICATE }}
          tags: ${{ steps.metadata_web.outputs.tags }}
          labels: ${{ steps.metadata_web.outputs.labels }}

      - name: Build and publish web image for staging
        id: build_web_staging
        if: ${{ github.ref_name == 'stage' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.nextjs
          platforms: linux/arm64
          push: true
          build-args: |
            CI=true
            COMMIT_SHA=${{ github.sha }}
            ${{ steps.load_public_env.outputs.build_args }}
          secrets: |
            POSTGRES_URL=${{ secrets.POSTGRES_URL }}
            SUPABASE_CERTIFICATE=${{ secrets.SUPABASE_CERTIFICATE }}
          tags: ${{ steps.metadata_web.outputs.tags }}
          labels: ${{ steps.metadata_web.outputs.labels }}

      - name: Resolve published web image digest
        id: resolve_published_web_digest
        shell: bash
        env:
          PRODUCTION_DIGEST: ${{ steps.build_web_production.outputs.digest }}
          STAGING_DIGEST: ${{ steps.build_web_staging.outputs.digest }}
        run: |
          set -euo pipefail

          digest="${PRODUCTION_DIGEST:-${STAGING_DIGEST:-}}"
          if [ -z "$digest" ]; then
            echo "Failed to resolve web image digest" >&2
            exit 1
          fi

          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

  build-and-publish-backend-image:
    name: Build and publish backend image
    if: ${{ github.ref_name == 'main' || github.ref_name == 'stage' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build_backend_image.outputs.digest }}
    env:
      IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/litomi-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate backend image metadata
        id: metadata_backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        id: build_backend_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.hono
          platforms: linux/arm64
          push: true
          tags: ${{ steps.metadata_backend.outputs.tags }}
          labels: ${{ steps.metadata_backend.outputs.labels }}

  update-staging-image-digests:
    name: Update staging image digests
    if: ${{ github.ref_name == 'stage' && github.event_name != 'pull_request' }}
    needs:
      - build-and-publish-web-image
      - build-and-publish-backend-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      OVERLAY_FILE: k8s/apps/litomi/overlays/stg/kustomization.yaml
      IMAGE_WEB_DIGEST: ${{ needs.build-and-publish-web-image.outputs.digest }}
      IMAGE_BACKEND_DIGEST: ${{ needs.build-and-publish-backend-image.outputs.digest }}
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: stage

      - name: Update staging image digests
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["OVERLAY_FILE"])
          text = path.read_text()

          replacements = {
              "litomi-web": os.environ["IMAGE_WEB_DIGEST"],
              "litomi-backend": os.environ["IMAGE_BACKEND_DIGEST"],
          }

          for name, digest in replacements.items():
              pattern = rf"(- name: {re.escape(name)}\n\s+newName: [^\n]+\n)(?:\s+newTag: \S+\n|\s+digest: \S+\n)"
              text, count = re.subn(pattern, lambda match: f"{match.group(1)}    digest: {digest}\n", text, count=1)
              if count != 1:
                  raise SystemExit(f"Failed to update digest for {name} in {path}")

          path.write_text(text)
          PY

      - name: Commit staging image digest updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "$OVERLAY_FILE"; then
            echo "Staging image digests are already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY_FILE"
          git commit -m "chore(k8s): bump staging image digests"
          git push origin HEAD:stage

  propose-production-image-digests:
    name: Propose production image digests
    if: ${{ github.ref_name == 'main' && github.event_name != 'pull_request' }}
    needs:
      - build-and-publish-web-image
      - build-and-publish-backend-image
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    env:
      OVERLAY_FILE: k8s/apps/litomi/overlays/prod/kustomization.yaml
      IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/litomi-web
      IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/litomi-backend
      IMAGE_WEB_DIGEST: ${{ needs.build-and-publish-web-image.outputs.digest }}
      IMAGE_BACKEND_DIGEST: ${{ needs.build-and-publish-backend-image.outputs.digest }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Update production image digests
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["OVERLAY_FILE"])
          text = path.read_text()

          replacements = {
              "litomi-web": os.environ["IMAGE_WEB_DIGEST"],
              "litomi-backend": os.environ["IMAGE_BACKEND_DIGEST"],
          }

          for name, digest in replacements.items():
              pattern = rf"(- name: {re.escape(name)}\n\s+newName: [^\n]+\n)(?:\s+newTag: \S+\n|\s+digest: \S+\n)"
              text, count = re.subn(pattern, lambda match: f"{match.group(1)}    digest: {digest}\n", text, count=1)
              if count != 1:
                  raise SystemExit(f"Failed to update digest for {name} in {path}")

          path.write_text(text)
          PY

      - name: Create or update production promotion PR
        id: create_production_pr
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: ${{ env.OVERLAY_FILE }}
          branch: codex/production-image-digests
          delete-branch: true
          commit-message: 'chore(k8s): propose production image digests'
          title: 'chore(k8s): promote production image digests'
          body: |
            This PR updates the production overlay to the latest immutable image digests built from `main`.

            - Web: `${{ env.IMAGE_WEB }}@${{ env.IMAGE_WEB_DIGEST }}`
            - Backend: `${{ env.IMAGE_BACKEND }}@${{ env.IMAGE_BACKEND_DIGEST }}`
            - Source commit: `${{ github.sha }}`
            - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          base: main

      - name: Report production promotion PR
        if: ${{ steps.create_production_pr.outputs.pull-request-url }}
        shell: bash
        run: |
          echo "Created or updated production promotion PR: ${{ steps.create_production_pr.outputs.pull-request-url }}"
