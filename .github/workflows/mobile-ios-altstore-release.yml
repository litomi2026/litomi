name: Mobile iOS AltStore Release

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mobile-ios-altstore-release.yml'
      - 'mobile/**'
      - '!mobile/altstore/source.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mobile-ios-altstore-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install mobile dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Compute version from mobile/package.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version_name="$(node -p "require('./mobile/package.json').version")"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"

      - name: Build AltStore Classic assets
        working-directory: mobile
        env:
          ALTSTORE_REPOSITORY_URL: https://github.com/${{ github.repository }}
          ALTSTORE_RELEASE_TAG: mobile-ios-altstore-v${{ steps.version.outputs.version_name }}
          ALTSTORE_SOURCE_BRANCH: main
        run: bun run ios:altstore

      - name: Upload Actions artifacts
        uses: actions/upload-artifact@v7
        with:
          name: litomi-ios-altstore-v${{ steps.version.outputs.version_name }}
          path: mobile/artifacts/ios/
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Litomi iOS AltStore v${{ steps.version.outputs.version_name }}
          tag_name: mobile-ios-altstore-v${{ steps.version.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            mobile/artifacts/ios/litomi-ios-altstore.ipa
            mobile/artifacts/ios/litomi-ios-altstore.ipa.sha256
            mobile/artifacts/ios/litomi-ios-altstore-dSYMs.zip
            mobile/artifacts/ios/litomi-ios-altstore-dSYMs.zip.sha256
            mobile/artifacts/ios/litomi-altstore-source.json
            mobile/artifacts/ios/litomi-altstore-source.json.sha256
            mobile/artifacts/ios/litomi-ios-altstore-build-info.txt
            mobile/artifacts/ios/litomi-ios-altstore-build-info.txt.sha256

      - name: Create or update AltStore source PR
        id: create_altstore_source_pr
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: mobile/altstore/source.json
          branch: codex/mobile-altstore-source
          delete-branch: true
          commit-message: 'chore(mobile): propose AltStore source for v${{ steps.version.outputs.version_name }}'
          title: 'chore(mobile): update AltStore source for v${{ steps.version.outputs.version_name }}'
          body: |
            This PR updates the stable AltStore source to the latest iOS release metadata built from `main`.

            - Version: `${{ steps.version.outputs.version_name }}`
            - Release tag: `mobile-ios-altstore-v${{ steps.version.outputs.version_name }}`
            - Source commit: `${{ github.sha }}`
            - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          base: main

      - name: Report AltStore source PR
        if: ${{ steps.create_altstore_source_pr.outputs.pull-request-url }}
        shell: bash
        run: |
          echo "Created or updated AltStore source PR: ${{ steps.create_altstore_source_pr.outputs.pull-request-url }}"
