name: Mobile Android Release (APK)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mobile-android-release.yml'
      - 'mobile/**'

permissions:
  contents: write

concurrency:
  group: mobile-android-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install mobile dependencies
        working-directory: mobile
        run: bun install --frozen-lockfile

      - name: Compute version from mobile/package.json
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_name=$(node -p "require('./mobile/package.json').version")
          IFS='.' read -r major minor patch <<< "$version_name"

          version_code=$((major*1000000 + minor*1000 + patch))

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Prepare Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p mobile/android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > mobile/android/keystore/release.jks

          cat > mobile/android/keystore.properties <<EOF
          storeFile=keystore/release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Sync Capacitor
        working-directory: mobile
        run: bun run sync:android

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew :app:assembleRelease -PversionName=${{ steps.version.outputs.version_name }} -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p mobile/artifacts/android
          cp mobile/android/app/build/outputs/apk/release/app-release.apk mobile/artifacts/android/litomi.apk
          sha256sum mobile/artifacts/android/litomi.apk | awk '{print $1}' > mobile/artifacts/android/litomi.apk.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-android-v${{ steps.version.outputs.version_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            mobile/artifacts/android/litomi.apk
            mobile/artifacts/android/litomi.apk.sha256
