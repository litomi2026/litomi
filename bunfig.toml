[test]
# Preload the shared base setup for all tests
preload = ["./test/setup.base.ts"]

# Test configuration
root = "./src"

# Coverage settings
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# Opt-in concurrent execution for explicitly marked pure unit tests
concurrentTestGlob = "**/*.concurrent.test.ts"
