apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-external-secrets
  annotations:
    # Ensure ESO (CRDs/controllers) are installed before apps apply ExternalSecret/SecretStore CRs.
    # Ref: https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/
    argocd.argoproj.io/sync-wave: '1'
spec:
  project: platform
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.0.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/k8s/platform/external-secrets/external-secrets.values.yaml
    - repoURL: https://github.com/gwak2837/litomi.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/gwak2837/litomi.git
      targetRevision: main
      path: k8s/platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
