apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litomi-stg
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  project: litomi
  source:
    repoURL: https://github.com/litomi2026/litomi.git
    targetRevision: stage
    path: k8s/apps/litomi/overlays/stg
  destination:
    server: https://kubernetes.default.svc
    namespace: litomi-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
