apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Argo CD 설치는 "처음 1번"만 kubectl로 부트스트랩하고,
# 이후 앱/플랫폼 리소스는 Argo CD(Application)로 GitOps 관리하는 걸 권장해요.

namespace: argocd

resources:
  - namespace.yaml
  # 멀티 노드 환경에선 manifests/ha/install.yaml 사용하기
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.0/manifests/install.yaml

patches:
  # Argo CD 외부 URL을 고정하고 argocd-cm를 bootstrap 레이어에서 단일 소유해 drift를 방지해요.
  - path: patches/argocd-cm.yaml
  # k3s 재시작 후 재부트스트랩 시 init container가 기존 symlink로 CrashLoop 나는 문제를 방지해요.
  - path: patches/argocd-repo-server-copyutil.yaml
