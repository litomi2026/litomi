apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: vault
  target:
    name: grafana-admin
    creationPolicy: Owner
    deletionPolicy: Delete
  dataFrom:
    - extract:
        key: monitoring/grafana-admin
