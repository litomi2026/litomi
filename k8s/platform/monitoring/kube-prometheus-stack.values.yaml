# kube-prometheus-stack values for a single-node k3s cluster (metrics + alerting)

defaultRules:
  create: true
  rules:
    # k3s: control plane components usually aren't exposed as scrapeable Services by default.
    etcd: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeProxy: false

    # Reduce noise/overhead: keep apiserver availability only.
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false

    # This cluster doesn't run Windows nodes.
    windows: false

  disabled:
    # Always-firing "pipeline health" alerts. Keep them off to reduce noise.
    # If you want “alerting pipeline is alive” verification, enable and route/silence intentionally.
    Watchdog: true
    InfoInhibitor: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'null'
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Drop info-level alerts by default.
        - receiver: 'null'
          matchers:
            - severity="info"
    receivers:
      - name: 'null'
    inhibit_rules:
      # Critical inhibits warning for the same thing.
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace']
      # Warning inhibits info for the same thing.
      - source_matchers:
          - severity="warning"
        target_matchers:
          - severity="info"
        equal: ['alertname', 'namespace']

  alertmanagerSpec:
    alertmanagerConfigSelector:
      matchLabels:
        alertmanagerConfig: enabled
    alertmanagerConfigMatcherStrategy:
      type: None
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # Small PVC is enough for silences/inhibitions history.
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 2Gi

grafana:
  enabled: false

# k3s: control plane components usually aren't exposed as scrapeable Services by default.
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

prometheus:
  prometheusSpec:
    replicas: 1

    # Useful when you later add another cluster (or just to make dashboards clearer).
    externalLabels:
      cluster: litomi-k3s

    # Local retention (TSDB): keep it short, and rely on Grafana Cloud for longer retention.
    retention: 14d
    retentionSize: 40GiB

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: '2'
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 50Gi

    remoteWrite:
      - url: https://prometheus-prod-49-prod-ap-northeast-0.grafana.net/api/prom/push
        basicAuth:
          username:
            name: grafana-cloud-remote-write
            key: username
          password:
            name: grafana-cloud-remote-write
            key: password
