# kube-prometheus-stack values for a single-node k3s cluster (metrics-only first rollout)
#
# Goals
# - Metrics only (Logs/Traces later)
# - Grafana: use Grafana Cloud → disable in-cluster Grafana
# - Prometheus: keep data in-cluster (PVC) with 30d retention + size cap
# - Alerting: disable for now to avoid noisy first rollout (enable later when you’re ready)

defaultRules:
  # Disable the huge default rule set for the first rollout.
  # (You can enable it later once you have Alertmanager routing in place.)
  create: false

alertmanager:
  enabled: false

grafana:
  enabled: false

# k3s: control plane components usually aren't exposed as scrapeable Services by default.
# Disable them unless you explicitly wire endpoints/services.
kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

prometheus:
  prometheusSpec:
    # Single node → 1 replica
    replicas: 1

    # Useful when you later add another cluster (or just to make dashboards clearer).
    externalLabels:
      cluster: litomi-k3s

    # Local retention (TSDB): keep it short, and rely on Grafana Cloud for longer retention.
    retention: 14d
    retentionSize: 40GiB

    # Initial sizing (10 CPU / 16Gi RAM). Tune after observing.
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: '2'
        memory: 4Gi

    # Metrics-only rollout: no in-cluster alerting yet.
    disableAlerting: true

    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 100Gi

    remoteWrite:
      - url: https://prometheus-prod-49-prod-ap-northeast-0.grafana.net/api/prom
        basicAuth:
          username:
            name: grafana-cloud-remote-write
            key: username
          password:
            name: grafana-cloud-remote-write
            key: password
