apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: litomi-stg

resources:
  - ../../base
  - hpa-backend.yaml
  - hpa-web.yaml
  - namespace.yaml
  - serviceaccount-eso-vault.yaml
  - secretstore-vault.yaml
  - externalsecret-litomi-backend-secret.yaml
  - ingress.yaml

patches:
  - path: patch-backend-deployment.yaml
  - path: patch-web-deployment.yaml

configMapGenerator:
  - name: litomi-public-env
    envs:
      - public.env.kv

  - name: litomi-common-env
    literals:
      - APP_ENV=stg
      - APP_ORIGIN=https://stg.litomi.in
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://opentelemetry-collector.tracing.svc:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.3
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=litomi,deployment.environment=stg,k8s.cluster.name=litomi-k3s
      - POSTGRES_HEALTHCHECK_CACHE_MS=15000

images:
  - name: litomi-web
    newName: ghcr.io/litomi2026/litomi-web
    digest: sha256:aa43602c075213995c6ff62769818b7550f9fbf5d6a351e97d7380fc4d51dc4e
  - name: litomi-backend
    newName: ghcr.io/litomi2026/litomi-backend
    digest: sha256:e8b293274c25e0eb1ee251647c94f8d2ea4057925cb9a65687429934b50ec244
