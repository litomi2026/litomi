apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: litomi-prod

resources:
  - ../../base
  - hpa-backend.yaml
  - hpa-web.yaml
  - namespace.yaml
  - serviceaccount-eso-vault.yaml
  - secretstore-vault.yaml
  - externalsecret-litomi-backend-secret.yaml
  - ingress.yaml
  - workload-identity-template/serviceaccount-backend-google-auth.yaml
  - workload-identity-template/configmap-backend-google-credentials.yaml

patches:
  - path: patch-backend-deployment.yaml
  - path: patch-web-deployment.yaml
  - path: workload-identity-template/patch-backend-deployment-google-auth.yaml

configMapGenerator:
  - name: litomi-public-env
    envs:
      - public.env.kv

  - name: litomi-common-env
    literals:
      - APP_ENV=prod
      - APP_ORIGIN=https://litomi.in
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://opentelemetry-collector.tracing.svc:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.01
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=litomi,deployment.environment=prod,k8s.cluster.name=litomi-k3s

images:
  - name: litomi-web
    newName: ghcr.io/litomi2026/litomi-web
    digest: sha256:94dc4fc3f654c187e9a667d813d2a432f642790d2b0079a23a8e611f46ccb31d
  - name: litomi-backend
    newName: ghcr.io/litomi2026/litomi-backend
    digest: sha256:f26858d37c0d9d6d45876f2ef00d75da44ff1c079ed1dca1ca06d37f01aba94f
