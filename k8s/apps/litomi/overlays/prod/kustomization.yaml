apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: litomi-prod

resources:
  - ../../base
  - hpa-backend.yaml
  - hpa-web.yaml
  - namespace.yaml
  - serviceaccount-eso-vault.yaml
  - secretstore-vault.yaml
  - externalsecret-litomi-backend-secret.yaml
  - ingress.yaml

patches:
  - path: patch-backend-deployment.yaml
  - path: patch-web-deployment.yaml

configMapGenerator:
  - name: litomi-public-env
    envs:
      - public.env.kv

  - name: litomi-common-env
    literals:
      - APP_ORIGIN=https://litomi.in
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://opentelemetry-collector.tracing.svc:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=0.01
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=litomi,deployment.environment=prod,k8s.cluster.name=litomi-k3s

images:
  - name: litomi-web
    newName: ghcr.io/gwak2837/litomi-web
    digest: sha256:5b0e271803207ba4ee68de3877c6ec97eaaae4374a1c1952789c7bcfa7c7df53
  - name: litomi-backend
    newName: ghcr.io/gwak2837/litomi-backend
    digest: sha256:b2f62ceb87b86dd64c791b40fec142323ff313719b7b2ed5fd2cca302c7fd7ed
