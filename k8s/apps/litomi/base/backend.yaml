apiVersion: apps/v1
kind: Deployment
metadata:
  name: litomi-backend
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: litomi-backend
  template:
    metadata:
      labels:
        app: litomi-backend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: litomi-backend:prod
          imagePullPolicy: Always
          env:
            - name: PORT
              value: '3002'
          envFrom:
            - configMapRef:
                name: litomi-common-env
            - configMapRef:
                name: litomi-backend-env
            - secretRef:
                name: litomi-backend-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 768Mi
            limits:
              cpu: 200m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: litomi-backend
spec:
  selector:
    app: litomi-backend
  ports:
    - port: 3002
